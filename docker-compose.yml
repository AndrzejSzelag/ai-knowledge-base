# ==============================================================================
# Spring AI Knowledge Base - Main Application Stack
# RUN: docker compose up -d
# ==============================================================================

services:
  app:
    build: .
    container_name: ai-app
    ports:
      - "8080:8080"
    environment:
      # Use service name 'db' and internal port 5432
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/ai-db
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=pass

      # Ollama API connection via host bridge
      - SPRING_AI_OLLAMA_BASE_URL=http://host.docker.internal:11434
      
      # OAuth2 Security (Passed from local .env or shell environment)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}

    extra_hosts:
      # Required to access Ollama running on the host machine
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    networks:
      - ai-network
    healthcheck:
      test: [ "CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: pgvector/pgvector:pg16
    container_name: postgres-pgvector
    deploy:
      resources:
        limits:
          memory: 1500M # Optimized for 8GB RAM host
        reservations:
          memory: 512M
    ports:
      # External access on 5433 to avoid conflict with local PostgreSQL
      - "5433:5432"
    environment:
      - POSTGRES_DB=ai-db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-initialization of vector extension and tables
      - ./src/main/resources/init-vector.sql:/docker-entrypoint-initdb.d/init-vector.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ai-db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ai-network

volumes:
  postgres_data:

networks:
  ai-network:
    driver: bridge